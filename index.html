        const db = getDatabase();

        const firebaseRef = ref(db, 'users/' + 'rasbpi');
        onValue(firebaseRef, (snapshot) => {
            var wordsDiv = document.getElementById("words-div");
            wordsDiv.innerHTML = "";

            snapshot.forEach(function(element){
                var newParagraphElement = `<p>${element.val()}</p>`;
                wordsDiv.innerHTML += newParagraphElement;
            });
        });
